meta:
  profile: default
  source: replicated
  theme: academic-color
  layout: horizontal
  canvas: auto
  routing: orthogonal
  title: 当前保险理赔分类残差式 MLP 结构图
  description: 参照经典 MLP 视觉风格重绘当前 InsuranceMLP 的真实网络结构。
  replication:
    colorMode: preserve-original
    background: '#FFFFFF'
    palette:
      - hex: '#5AA6E8'
        role: connector stroke
        appliesTo: edges
        confidence: high
      - hex: '#4B79A8'
        role: input node stroke and text
        appliesTo: nodes
        confidence: high
      - hex: '#79BE56'
        role: backbone node stroke and text
        appliesTo: nodes
        confidence: high
      - hex: '#D78137'
        role: head and output node stroke and text
        appliesTo: nodes
        confidence: high
    confidenceNotes:
      - 保留参考图的白底、蓝色输入与连线、绿色隐藏层、橙色输出层视觉语言。
      - 将经典 MLP 的抽象隐藏层替换为当前项目中的共享残差主干和单分类头。
modules:
  - id: backbone
    label: 共享残差主干
    style:
      fillColor: '#F6FFF1'
      strokeColor: '#B7D89B'
      strokeWidth: 2
      fontColor: '#4F8D32'
nodes:
  - id: x1
    label: x1
    type: user
    size: xl
    position:
      x: 96
      'y': 112
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#4B79A8'
      fontColor: '#3E6488'
